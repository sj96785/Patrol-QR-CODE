const elName = document.getElementById('name');
const elAddr = document.getElementById('addr');
const elDist = document.getElementById('dist');
const qrImg = document.getElementById('qrImg');

function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

let lastKey = '';

function updateNearest(lat, lon) {
  let best = null;
  for (const p of PLACES) {
    const d = haversineMeters(lat, lon, p.lat, p.lon);
    if (!best || d < best.d) best = { p, d };
  }
  if (!best) return;

  const key = best.p.name + '|' + best.p.qr_text;
  if (key !== lastKey) {
    elName.textContent = best.p.name;
    elAddr.textContent = best.p.addr || '';
    qrImg.src = best.p.qr_png;
    lastKey = key;
  }
  elDist.textContent = `距離 ${Math.round(best.d)} 公尺`;
}

function startGeo() {
  if (!('geolocation' in navigator)) {
    elName.textContent = '不支援定位';
    elAddr.textContent = '';
    elDist.textContent = '';
    qrImg.removeAttribute('src');
    return;
  }

  navigator.geolocation.watchPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      updateNearest(lat, lon);
    },
    (err) => {
      elName.textContent = '無法取得定位';
      elAddr.textContent = '';
      elDist.textContent = '';
      qrImg.removeAttribute('src');
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 10000
    }
  );
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
}

startGeo();
</script>
