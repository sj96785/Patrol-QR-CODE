function toRad(d){ return d*Math.PI/180; }
function distanceMeters(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)*Math.sin(dLon/2);
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

const elName = document.getElementById('name');
const elAddr = document.getElementById('addr');
const elDist = document.getElementById('dist');
const qrImg = document.getElementById('qrImg');

let lastId = null;

function renderPoint(p, meters) {
  elName.textContent = p.name || '';
  elAddr.textContent = (p.addr || '').trim();
  elDist.textContent = `${Math.round(meters)} 公尺`;
  qrImg.src = p.qr_img || '';
}

function pickNearest(lat, lon) {
  let best = null;
  for(const p of POINTS) {
    const m = distanceMeters(lat, lon, p.lat, p.lon);
    if(!best || m < best.m) best = {p, m};
  }
  return best;
}

function startGPS() {
  if(!navigator.geolocation) {
    elName.textContent = '此裝置不支援定位';
    elAddr.textContent = '';
    elDist.textContent = '—';
    return;
  }
  navigator.geolocation.watchPosition((pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const best = pickNearest(lat, lon);
    if(!best) {
      elName.textContent = '清冊無有效座標';
      elAddr.textContent = '';
      elDist.textContent = '—';
      return;
    }
    if(best.p.id !== lastId) {
      lastId = best.p.id;
      renderPoint(best.p, best.m);
    } else {
      elDist.textContent = `${Math.round(best.m)} 公尺`;
    }
  }, () => {
    elName.textContent = '無法取得定位';
    elAddr.textContent = '';
    elDist.textContent = '—';
  }, {
    enableHighAccuracy:true,
    maximumAge: 2000,
    timeout: 15000
  });
}

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}

startGPS();
</script>
