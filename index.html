  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --card: #f4f4f6;
      --line: #dedee3;
      --text: #111111;
      --muted: #666666;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    main {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: max(18px, env(safe-area-inset-top))
               max(18px, env(safe-area-inset-right))
               max(18px, env(safe-area-inset-bottom))
               max(18px, env(safe-area-inset-left));
    }
    .card {
      width: min(520px, 100%);
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.05);
    }
    .caption {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }
    h1 {
      margin: 7px 0 4px;
      font-size: clamp(24px, 7vw, 30px);
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .distance {
      margin: 0 0 16px;
      font-size: 21px;
      font-weight: 900;
    }
    .qr-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 280px;
      padding: 10px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 18px;
    }
    #qrImage {
      display: none;
      width: min(340px, 100%);
      height: auto;
      image-rendering: pixelated;
    }
    .placeholder {
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
    }
    .status {
      min-height: 20px;
      margin-top: 11px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
    }
  </style>

  const nameEl = document.getElementById("placeName");
  const distanceEl = document.getElementById("distance");
  const qrEl = document.getElementById("qrImage");
  const placeholderEl = document.getElementById("placeholder");
  const statusEl = document.getElementById("status");

  let watchId = null;
  let retryTimer = null;

  const toRad = value => value * Math.PI / 180;

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const radius = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) *
      Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) ** 2;
    return radius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function findNearest(latitude, longitude) {
    let nearest = null;
    for (const point of POINTS) {
      const distance = distanceMeters(
        latitude,
        longitude,
        point.lat,
        point.lon
      );
      if (!nearest || distance < nearest.distance) {
        nearest = { point, distance };
      }
    }
    return nearest;
  }

  function render(position) {
    const nearest = findNearest(
      position.coords.latitude,
      position.coords.longitude
    );

    if (!nearest) {
      nameEl.textContent = "沒有可用地點";
      statusEl.textContent = "清冊內沒有可用的巡邏點資料。";
      return;
    }

    nameEl.textContent = nearest.point.name;
    distanceEl.textContent =
      `距離：${Math.round(nearest.distance).toLocaleString("zh-Hant-TW")} 公尺`;

    qrEl.src = nearest.point.qrImage;
    qrEl.alt = `${nearest.point.name} QR Code`;
    qrEl.style.display = "block";
    placeholderEl.style.display = "none";

    const accuracy = Math.round(position.coords.accuracy || 0);
    statusEl.textContent =
      `定位持續更新中；目前定位精確度約 ±${accuracy} 公尺。`;
  }

  function clearWatch() {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
  }

  function showError(error) {
    clearWatch();

    const messages = {
      1: "定位權限遭拒絕，請到瀏覽器網站權限設定中允許位置存取。",
      2: "目前無法取得位置，請確認手機定位功能已開啟。",
      3: "定位逾時，系統將自動重新嘗試。"
    };

    nameEl.textContent = "定位失敗";
    distanceEl.textContent = "距離：— 公尺";
    qrEl.style.display = "none";
    placeholderEl.style.display = "block";
    placeholderEl.textContent = messages[error.code] || "定位時發生錯誤。";
    statusEl.textContent =
      error.code === 1
        ? "允許定位後，重新整理頁面即可使用。"
        : "系統將於 5 秒後自動重新定位。";

    if (error.code !== 1) {
      window.clearTimeout(retryTimer);
      retryTimer = window.setTimeout(start, 5000);
    }
  }

  function start() {
    window.clearTimeout(retryTimer);

    if (!POINTS.length) {
      nameEl.textContent = "清冊尚未載入";
      statusEl.textContent = "巡邏點清冊沒有資料。";
      return;
    }

    if (!("geolocation" in navigator)) {
      nameEl.textContent = "不支援定位";
      statusEl.textContent = "此瀏覽器不支援定位功能。";
      return;
    }

    clearWatch();
    nameEl.textContent = "正在定位…";
    distanceEl.textContent = "距離：— 公尺";
    qrEl.style.display = "none";
    placeholderEl.style.display = "block";
    placeholderEl.textContent = "正在取得目前位置…";
    statusEl.textContent = "請允許瀏覽器使用定位權限。";

    watchId = navigator.geolocation.watchPosition(
      render,
      showError,
      {
        enableHighAccuracy: true,
        maximumAge: 2000,
        timeout: 15000
      }
    );
  }

  // 開啟頁面後立即定位，不需要按按鈕。
  start();

  // 從背景切回頁面時重新確認定位追蹤。
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && watchId === null) start();
  });
})();
</script>
