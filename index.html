      font-size: 20px;
      margin: 6px 0 12px;

      color: #fff;

      font-size: 22px;

      margin: 0 0 10px;

      margin: 0 0 10px;
    }
    .status {

      color: #777;
      font-weight: 700;
      margin-top: 8px;
    }
    .qr {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0 0;
    }
    #qrImg {
      width: 260px;
      height: 260px;
      image-rendering: pixelated;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fff;
    }
    .mini {
      font-size: 12px;
      color: #777;
      font-weight: 700;
      margin-top: 10px;
      line-height: 1.45;
      white-space: pre-wrap;

let watchId = null;

function toRad(deg) {
  return deg * Math.PI / 180;
}

function distanceMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)*Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function findNearest(lat, lon) {
  let best = null;
  for (const p of POINTS) {
    if (typeof p.lat !== "number" || typeof p.lon !== "number") continue;
    const d = distanceMeters(lat, lon, p.lat, p.lon);
    if (!best || d < best.d) best = { p, d };
  }
  return best;
}

function setUI(nearest, pos) {
  const nameEl = document.getElementById("placeName");
  const addrEl = document.getElementById("placeAddr");
  const distEl = document.getElementById("placeDist");
  const qrImg = document.getElementById("qrImg");
  const mini = document.getElementById("mini");

  if (!nearest) {
    nameEl.textContent = "找不到可用座標";
    addrEl.textContent = "";
    distEl.textContent = "";
    qrImg.removeAttribute("src");
    mini.textContent = "";
    return;
  }

  nameEl.textContent = nearest.p.name || "（未命名地點）";
  const addr = (nearest.p.addr ?? "").toString().trim();
  addrEl.textContent = addr ? addr : "（地址空白）";

  distEl.textContent = `距離：${Math.round(nearest.d)} 公尺`;

  qrImg.src = nearest.p.qrUri;

  const acc = pos?.coords?.accuracy;
  const lat = pos?.coords?.latitude;
  const lon = pos?.coords?.longitude;

  let extra = "";
  if (typeof acc === "number") extra += `定位精度：±${Math.round(acc)} m
`;
  if (typeof lat === "number" && typeof lon === "number") extra += `目前座標：${lat.toFixed(6)}, ${lon.toFixed(6)}`;
  mini.textContent = extra;
}

function setStatus(text) { /* UI已精簡：不顯示狀態文字 */ }

function onPos(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const nearest = findNearest(lat, lon);
  setUI(nearest, pos);
}

function onErr(err) {
  let msg = "定位失敗";
  if (err && err.code === 1) msg = "定位失敗：未允許定位";
  else if (err && err.code === 2) msg = "定位失敗：無法取得位置";
  else if (err && err.code === 3) msg = "定位失敗：逾時";
}

async function start() {
  if (!("geolocation" in navigator)) {
return;
  }
  const opts = {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 15000
  };
try {
    watchId = navigator.geolocation.watchPosition(onPos, onErr, opts);
} catch (e) {
}
}

function stop() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}
window.addEventListener("load", () => { start(); });

// PWA SW
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
</script>
